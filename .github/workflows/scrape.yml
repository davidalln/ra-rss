name: Scrape RA Reviews

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [scrape]

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node ra-rss.js

      - name: Commit updated feed and state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ra-album-reviews.xml ra-state.json
          git diff --cached --quiet || git commit -m "chore: update RA reviews feed [skip ci]"
          git push

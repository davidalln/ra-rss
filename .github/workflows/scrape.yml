name: Scrape RA Reviews

on:
  schedule:
    # Runs every 10 minutes
    # Note: GitHub Actions schedules have ~1 min jitter and won't run more
    # frequently than every 5 minutes. 10 min is a safe, polite interval.
    - cron: '*/10 * * * *'
  workflow_dispatch: # allows manual trigger from the Actions tab

permissions:
  contents: write  # needed to commit state + XML back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch the full history so we can commit back cleanly
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node ra-rss.js

      - name: Commit updated feed and state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ra-album-reviews.xml ra-state.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update RA reviews feed [skip ci]"
          git push
